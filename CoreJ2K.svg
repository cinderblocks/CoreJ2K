<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050C18;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tileGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A6B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tileGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005FA3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002A52;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tileGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003F75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001A35;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture inside circle -->
  <g clip-path="url(#circle)" opacity="0.07" stroke="#4499CC" stroke-width="0.5">
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
  </g>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#00C9FF" stroke-width="1.5" opacity="0.25"/>

  <!-- Wavelet decomposition tiles, centered -->
  <!-- All tiles clipped to circle -->
  <g clip-path="url(#circle)">
    <!-- Outer frame hint -->
    <rect x="34" y="34" width="132" height="132" rx="4" fill="none" stroke="#00C9FF" stroke-width="1" opacity="0.2"/>

    <!-- 4 main quadrants -->
    <rect x="36" y="36" width="63" height="63" rx="2" fill="url(#tileGrad)" filter="url(#glow)"/>
    <rect x="101" y="36" width="63" height="63" rx="2" fill="url(#tileGrad2)"/>
    <rect x="36" y="101" width="63" height="63" rx="2" fill="url(#tileGrad3)"/>
    <rect x="101" y="101" width="63" height="63" rx="2" fill="url(#tileGrad4)"/>

    <!-- Sub-decomposition in top-left -->
    <rect x="36" y="36" width="30" height="30" rx="1.5" fill="#00C9FF" opacity="0.9" filter="url(#softGlow)"/>
    <rect x="68" y="36" width="30" height="30" rx="1.5" fill="#0099EE" opacity="0.75"/>
    <rect x="36" y="68" width="30" height="30" rx="1.5" fill="#0077CC" opacity="0.75"/>
    <rect x="68" y="68" width="30" height="30" rx="1.5" fill="#005599" opacity="0.65"/>

    <!-- Sub-sub in top-left-top-left -->
    <rect x="36" y="36" width="13" height="13" rx="1" fill="#FFFFFF" opacity="0.98" filter="url(#glow)"/>
    <rect x="51" y="36" width="13" height="13" rx="1" fill="#CCEFFF" opacity="0.75"/>
    <rect x="36" y="51" width="13" height="13" rx="1" fill="#99D9FF" opacity="0.65"/>
    <rect x="51" y="51" width="13" height="13" rx="1" fill="#55BBFF" opacity="0.55"/>

    <!-- Dividers -->
    <line x1="100" y1="34" x2="100" y2="166" stroke="#00C9FF" stroke-width="1.5" opacity="0.4"/>
    <line x1="34" y1="100" x2="166" y2="100" stroke="#00C9FF" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- "J2K" label at bottom -->
  <text
    x="100"
    y="187"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="15"
    font-weight="700"
    letter-spacing="4"
    text-anchor="middle"
    fill="url(#tileGrad)"
    filter="url(#softGlow)"
  >J2K</text>
</svg>
